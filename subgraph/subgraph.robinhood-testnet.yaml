specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: PolicyVault
    network: robinhood-testnet
    source:
      address: "0x073fc3fE9B2c00E470199550870D458D13421614"
      abi: PolicyVault
      startBlock: 9646171
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtocolConfig
        - Evaluator
        - Dataset
        - Policy
      abis:
        - name: PolicyVault
          file: ../abis/PolicyVault.abi.json
      eventHandlers:
        - event: DatasetRegistered(indexed uint256,indexed address,bytes32,bytes32,bytes32,bytes32)
          handler: handleDatasetRegistered
        - event: DatasetStatusUpdated(indexed uint256,bool)
          handler: handleDatasetStatusUpdated
        - event: PolicyCreated(indexed uint256,indexed uint256,indexed address,address,address,uint256,bool,bytes32,uint32,bytes32,bytes32)
          handler: handlePolicyCreated
        - event: PolicyUpdated(indexed uint256,indexed uint256,uint256,bool,bytes32)
          handler: handlePolicyUpdated
        - event: PolicyEvaluatorRegistered(indexed address,indexed address,bytes32,uint256,bool)
          handler: handlePolicyEvaluatorRegistered
        - event: PolicyEvaluatorStatusUpdated(indexed address,bool)
          handler: handlePolicyEvaluatorStatusUpdated
        - event: PolicyEvaluatorFeeUpdated(uint256)
          handler: handlePolicyEvaluatorFeeUpdated
        - event: PolicyEvaluatorFeeRecipientUpdated(indexed address)
          handler: handlePolicyEvaluatorFeeRecipientUpdated
      file: ./src/policy-vault.ts

  - kind: ethereum/contract
    name: PaymentModule
    network: robinhood-testnet
    source:
      address: "0x5b4a056d2203C5940257635F073A253B958ba43c"
      abi: PaymentModule
      startBlock: 9646171
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtocolConfig
        - Dataset
        - Policy
        - AccessGrant
        - Receipt
      abis:
        - name: PaymentModule
          file: ../abis/PaymentModule.abi.json
      eventHandlers:
        - event: AccessGranted(indexed uint256,indexed uint256,indexed uint256,address,address,address,uint256,uint64,bool,bytes32,bytes32)
          handler: handleAccessGranted
        - event: PolicyVaultUpdated(indexed address)
          handler: handlePolicyVaultUpdated
        - event: AccessReceiptUpdated(indexed address)
          handler: handleAccessReceiptUpdated
      file: ./src/payment-module.ts

  - kind: ethereum/contract
    name: AccessReceipt
    network: robinhood-testnet
    source:
      address: "0x4Aa65779ce3dF24E5EeC7a786721765dF50a106b"
      abi: AccessReceipt
      startBlock: 9646171
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtocolConfig
        - Dataset
        - Policy
        - Receipt
      abis:
        - name: AccessReceipt
          file: ../abis/AccessReceipt.abi.json
      eventHandlers:
        - event: ReceiptMinted(indexed uint256,indexed uint256,indexed uint256,address,address,address,uint256,uint64,bool,bytes32,bytes32)
          handler: handleReceiptMinted
        - event: PaymentModuleUpdated(indexed address)
          handler: handlePaymentModuleUpdated
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/access-receipt.ts
