name: Publish CLI Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: string
      dry_run:
        description: Run the full packaging flow without publishing to npm
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-cli-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      REPO_VISIBILITY: ${{ github.event.repository.visibility }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package metadata
        id: metadata
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          tarball_name="${package_name}-${package_version}.tgz"
          {
            echo "package_name=$package_name"
            echo "package_version=$package_version"
            echo "tarball_name=$tarball_name"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: ${{ github.event_name == 'release' }}
        run: |
          expected_tag="v${{ steps.metadata.outputs.package_version }}"
          actual_tag="${{ github.event.release.tag_name }}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag $actual_tag does not match package version $expected_tag" >&2
            exit 1
          fi

      - name: Check npm version availability
        id: registry
        run: |
          if npm view "${{ steps.metadata.outputs.package_name }}@${{ steps.metadata.outputs.package_version }}" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke test CLI package
        run: |
          pnpm run help
          pnpm pack
          npx --yes "./${{ steps.metadata.outputs.tarball_name }}" help

      - name: Dry-run npm publish
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          npm publish "${{ steps.metadata.outputs.tarball_name }}" --access public --tag "$NPM_TAG" --dry-run

      - name: Publish to npm
        if: ${{ env.DRY_RUN != 'true' && steps.registry.outputs.published != 'true' }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is required to publish the CLI package." >&2
            exit 1
          fi
          publish_args=( "${{ steps.metadata.outputs.tarball_name }}" --access public --tag "$NPM_TAG" )
          if [ "$REPO_VISIBILITY" = "public" ]; then
            publish_args+=( --provenance )
          else
            echo "Skipping npm provenance because ${{ github.repository }} is $REPO_VISIBILITY." >&2
          fi
          npm publish "${publish_args[@]}"

      - name: Write summary
        if: ${{ always() }}
        run: |
          {
            echo "## CLI publish summary"
            echo ""
            echo "- Package: \`${{ steps.metadata.outputs.package_name }}\`"
            echo "- Version: \`${{ steps.metadata.outputs.package_version }}\`"
            echo "- npm tag: \`$NPM_TAG\`"
            echo "- Dry run: \`$DRY_RUN\`"
            echo "- Already on npm: \`${{ steps.registry.outputs.published }}\`"
            if [ "$DRY_RUN" = "true" ]; then
              echo "- Result: completed dry-run package validation"
            elif [ "${{ steps.registry.outputs.published }}" = "true" ]; then
              echo "- Result: skipped publish because this version is already available on npm"
            else
              echo "- Result: published to npm"
              echo "- Provenance: \`$([ \"$REPO_VISIBILITY\" = \"public\" ] && echo enabled || echo skipped for private repository)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
