name: Deploy EVM Testnet

on:
  workflow_dispatch:
    inputs:
      network:
        description: Network to deploy
        required: true
        default: robinhood-testnet
        type: choice
        options:
          - arbitrum-sepolia
          - robinhood-testnet
      verify_native_explorer:
        description: Attempt native explorer verification for the selected network
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: deploy-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: arbitrum-sepolia
    env:
      ACCESS_RECEIPT_CONTRACT_PATH: src/AccessReceipt.sol:AccessReceipt
      PAYMENT_MODULE_CONTRACT_PATH: src/PaymentModule.sol:PaymentModule
      POLICY_VAULT_CONTRACT_PATH: src/PolicyVault.sol:PolicyVault
      PROXY_CONTRACT_PATH: "lib/openzeppelin-contracts/contracts/proxy/ERC1967/ERC1967Proxy.sol:ERC1967Proxy"
      COMPILER_VERSION: v0.8.24+commit.e11b9ed9
      OPTIMIZER_RUNS: "200"
      ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
      ROBINHOOD_TESTNET_RPC_URL: ${{ secrets.ROBINHOOD_TESTNET_RPC_URL }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETH_PK: ${{ secrets.ETH_PK }}
      ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Resolve deployment target
        id: target
        run: |
          case "${{ inputs.network }}" in
            arbitrum-sepolia)
              echo "CHAIN_ID=421614" >> "$GITHUB_ENV"
              echo "NETWORK_NAME=arbitrum-sepolia" >> "$GITHUB_ENV"
              echo "IDENTITY_REGISTRY_ADDRESS=0x8004A818BFB912233c491871b3d84c89A494BD9e" >> "$GITHUB_ENV"
              echo "DEPLOYMENT_FILE=deployments/arbitrum-sepolia.json" >> "$GITHUB_ENV"
              echo "BROADCAST_FILE=broadcast/Deploy.s.sol/421614/run-latest.json" >> "$GITHUB_ENV"
              echo "RPC_URL=$ARBITRUM_SEPOLIA_RPC_URL" >> "$GITHUB_ENV"
              echo "EXPLORER_LABEL=Arbiscan" >> "$GITHUB_ENV"
              echo "EXPLORER_ADDRESS_URL=https://sepolia.arbiscan.io/address" >> "$GITHUB_ENV"
              echo "EXPLORER_TX_URL=https://sepolia.arbiscan.io/tx" >> "$GITHUB_ENV"
              echo "SOURCIFY_REPO_URL=https://repo.sourcify.dev/421614" >> "$GITHUB_ENV"
              echo "ENABLE_SOURCIFY=true" >> "$GITHUB_ENV"
              echo "NATIVE_VERIFIER=etherscan" >> "$GITHUB_ENV"
              {
                echo "network_name=arbitrum-sepolia"
                echo "deployment_file=deployments/arbitrum-sepolia.json"
                echo "broadcast_file=broadcast/Deploy.s.sol/421614/run-latest.json"
              } >> "$GITHUB_OUTPUT"
              ;;
            robinhood-testnet)
              echo "CHAIN_ID=46630" >> "$GITHUB_ENV"
              echo "NETWORK_NAME=robinhood-testnet" >> "$GITHUB_ENV"
              echo "IDENTITY_REGISTRY_ADDRESS=0x0000000000000000000000000000000000000000" >> "$GITHUB_ENV"
              echo "DEPLOYMENT_FILE=deployments/robinhood-testnet.json" >> "$GITHUB_ENV"
              echo "BROADCAST_FILE=broadcast/Deploy.s.sol/46630/run-latest.json" >> "$GITHUB_ENV"
              echo "RPC_URL=$ROBINHOOD_TESTNET_RPC_URL" >> "$GITHUB_ENV"
              echo "EXPLORER_LABEL=Robinhood Explorer" >> "$GITHUB_ENV"
              echo "EXPLORER_ADDRESS_URL=https://explorer.testnet.chain.robinhood.com/address" >> "$GITHUB_ENV"
              echo "EXPLORER_TX_URL=https://explorer.testnet.chain.robinhood.com/tx" >> "$GITHUB_ENV"
              echo "SOURCIFY_REPO_URL=" >> "$GITHUB_ENV"
              echo "ENABLE_SOURCIFY=false" >> "$GITHUB_ENV"
              echo "NATIVE_VERIFIER=blockscout" >> "$GITHUB_ENV"
              echo "BLOCKSCOUT_VERIFIER_URL=https://explorer.testnet.chain.robinhood.com/api/" >> "$GITHUB_ENV"
              {
                echo "network_name=robinhood-testnet"
                echo "deployment_file=deployments/robinhood-testnet.json"
                echo "broadcast_file=broadcast/Deploy.s.sol/46630/run-latest.json"
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported network: ${{ inputs.network }}" >&2
              exit 1
              ;;
          esac

      - name: Validate deploy inputs
        run: |
          if [ -z "$RPC_URL" ]; then
            echo "Missing RPC_URL for $NETWORK_NAME" >&2
            exit 1
          fi
          if [ -z "$DEPLOYER_PRIVATE_KEY" ] && [ -z "$ETH_PK" ]; then
            echo "Missing DEPLOYER_PRIVATE_KEY or ETH_PK secret" >&2
            exit 1
          fi

      - name: Normalize deployer key and owner
        run: |
          deployer_key="${DEPLOYER_PRIVATE_KEY:-$ETH_PK}"
          case "$deployer_key" in
            0x*) export ETH_PK="$deployer_key" ;;
            *) export ETH_PK="0x$deployer_key" ;;
          esac
          deployer_address="$(cast wallet address --private-key "$ETH_PK")"
          contract_owner="${CONTRACT_OWNER:-$deployer_address}"
          echo "ETH_PK=$ETH_PK" >> "$GITHUB_ENV"
          echo "DEPLOYER_ADDRESS=$deployer_address" >> "$GITHUB_ENV"
          echo "CONTRACT_OWNER=$contract_owner" >> "$GITHUB_ENV"
          echo "IDENTITY_REGISTRY_ADDRESS=$IDENTITY_REGISTRY_ADDRESS" >> "$GITHUB_ENV"

      - name: Deploy contract stack
        run: |
          forge script script/Deploy.s.sol:Deploy --rpc-url "$RPC_URL" --broadcast -vvv

      - name: Capture deployment artifact
        id: deployment
        run: |
          policy_vault_implementation="$(jq -r '.transactions[] | select(.contractName == "PolicyVault") | .contractAddress' "$BROADCAST_FILE" | head -n1)"
          payment_module_implementation="$(jq -r '.transactions[] | select(.contractName == "PaymentModule") | .contractAddress' "$BROADCAST_FILE" | head -n1)"
          access_receipt_address="$(jq -r '.transactions[] | select(.contractName == "AccessReceipt") | .contractAddress' "$BROADCAST_FILE" | head -n1)"
          policy_vault_proxy="$(jq -r '.transactions[] | select(.contractName == "ERC1967Proxy") | .contractAddress' "$BROADCAST_FILE" | head -n1)"
          payment_module_proxy="$(jq -r '.transactions[] | select(.contractName == "ERC1967Proxy") | .contractAddress' "$BROADCAST_FILE" | tail -n1)"
          policy_vault_deploy_tx="$(jq -r '.transactions[] | select(.contractName == "ERC1967Proxy") | .hash' "$BROADCAST_FILE" | head -n1)"
          payment_module_deploy_tx="$(jq -r '.transactions[] | select(.contractName == "ERC1967Proxy") | .hash' "$BROADCAST_FILE" | tail -n1)"
          access_receipt_deploy_tx="$(jq -r '.transactions[] | select(.contractName == "AccessReceipt") | .hash' "$BROADCAST_FILE" | head -n1)"
          receipt_configuration_tx="$(jq -r '.transactions[] | select(.contractName == null and .function == "setPaymentModule(address)") | .hash' "$BROADCAST_FILE" | tail -n1)"
          final_transaction_hash="$(jq -r '.receipts[] | .transactionHash' "$BROADCAST_FILE" | tail -n1)"
          block_number_hex="$(jq -r '.receipts[] | .blockNumber' "$BROADCAST_FILE" | tail -n1)"
          policy_vault_implementation="$(cast to-check-sum-address "$policy_vault_implementation")"
          payment_module_implementation="$(cast to-check-sum-address "$payment_module_implementation")"
          access_receipt_address="$(cast to-check-sum-address "$access_receipt_address")"
          policy_vault_proxy="$(cast to-check-sum-address "$policy_vault_proxy")"
          payment_module_proxy="$(cast to-check-sum-address "$payment_module_proxy")"
          agent_identity_registry_address="$(cast to-check-sum-address "$IDENTITY_REGISTRY_ADDRESS")"
          deployer_address="$(cast to-check-sum-address "$DEPLOYER_ADDRESS")"
          contract_owner="$(cast to-check-sum-address "$CONTRACT_OWNER")"
          block_number="$(cast to-dec "$block_number_hex")"
          access_receipt_abi_checksum="$(shasum -a 256 abis/AccessReceipt.abi.json | awk '{print $1}')"
          identity_registry_abi_checksum="$(shasum -a 256 abis/IdentityRegistry.abi.json | awk '{print $1}')"
          payment_module_abi_checksum="$(shasum -a 256 abis/PaymentModule.abi.json | awk '{print $1}')"
          policy_vault_abi_checksum="$(shasum -a 256 abis/PolicyVault.abi.json | awk '{print $1}')"
          deployed_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          jq -n \
            --argjson chainId "$CHAIN_ID" \
            --arg network "$NETWORK_NAME" \
            --arg deployer "$deployer_address" \
            --arg requestedOwner "$contract_owner" \
            --argjson blockNumber "$block_number" \
            --arg transactionHash "$final_transaction_hash" \
            --arg deployedAt "$deployed_at" \
            --arg gitCommit "$GITHUB_SHA" \
            --arg policyVaultProxy "$policy_vault_proxy" \
            --arg policyVaultImplementation "$policy_vault_implementation" \
            --arg paymentModuleProxy "$payment_module_proxy" \
            --arg paymentModuleImplementation "$payment_module_implementation" \
            --arg accessReceiptAddress "$access_receipt_address" \
            --arg agentIdentityRegistryAddress "$agent_identity_registry_address" \
            --arg policyVaultDeployTx "$policy_vault_deploy_tx" \
            --arg paymentModuleDeployTx "$payment_module_deploy_tx" \
            --arg accessReceiptDeployTx "$access_receipt_deploy_tx" \
            --arg receiptConfigurationTx "$receipt_configuration_tx" \
            --arg accessReceiptAbiChecksum "$access_receipt_abi_checksum" \
            --arg identityRegistryAbiChecksum "$identity_registry_abi_checksum" \
            --arg paymentModuleAbiChecksum "$payment_module_abi_checksum" \
            --arg policyVaultAbiChecksum "$policy_vault_abi_checksum" \
            '{
              chainId: $chainId,
              network: $network,
              deployer: $deployer,
              requestedOwner: $requestedOwner,
              blockNumber: $blockNumber,
              transactionHash: $transactionHash,
              deployedAt: $deployedAt,
              gitCommit: $gitCommit,
              contracts: {
                policyVault: {
                  proxyAddress: $policyVaultProxy,
                  implementationAddress: $policyVaultImplementation,
                  proxyKind: "uups-erc1967",
                  abiFile: "abis/PolicyVault.abi.json",
                  abiChecksum: $policyVaultAbiChecksum
                },
                paymentModule: {
                  proxyAddress: $paymentModuleProxy,
                  implementationAddress: $paymentModuleImplementation,
                  proxyKind: "uups-erc1967",
                  abiFile: "abis/PaymentModule.abi.json",
                  abiChecksum: $paymentModuleAbiChecksum
                },
                accessReceipt: {
                  address: $accessReceiptAddress,
                  abiFile: "abis/AccessReceipt.abi.json",
                  abiChecksum: $accessReceiptAbiChecksum
                },
                identityRegistry: {
                  address: $agentIdentityRegistryAddress,
                  abiFile: "abis/IdentityRegistry.abi.json",
                  abiChecksum: $identityRegistryAbiChecksum
                }
              },
              entrypoints: {
                policyVaultAddress: $policyVaultProxy,
                paymentModuleAddress: $paymentModuleProxy,
                accessReceiptAddress: $accessReceiptAddress,
                agentIdentityRegistryAddress: $agentIdentityRegistryAddress
              },
              transactions: {
                policyVaultDeployment: $policyVaultDeployTx,
                paymentModuleDeployment: $paymentModuleDeployTx,
                accessReceiptDeployment: $accessReceiptDeployTx,
                receiptConfiguration: $receiptConfigurationTx
              }
            }' > "$DEPLOYMENT_FILE"
          {
            echo "policy_vault_proxy=$policy_vault_proxy"
            echo "policy_vault_implementation=$policy_vault_implementation"
            echo "payment_module_proxy=$payment_module_proxy"
            echo "payment_module_implementation=$payment_module_implementation"
            echo "access_receipt_address=$access_receipt_address"
            echo "agent_identity_registry_address=$agent_identity_registry_address"
            echo "deployer_address=$deployer_address"
            echo "requested_owner=$contract_owner"
            echo "transaction_hash=$final_transaction_hash"
            echo "block_number=$block_number"
          } >> "$GITHUB_OUTPUT"

      - name: Verify PolicyVault implementation on Sourcify
        if: ${{ env.ENABLE_SOURCIFY == 'true' }}
        run: >
          forge verify-contract
          --chain-id "$CHAIN_ID"
          --watch
          --verifier sourcify
          --compiler-version "$COMPILER_VERSION"
          --num-of-optimizations "$OPTIMIZER_RUNS"
          "${{ steps.deployment.outputs.policy_vault_implementation }}"
          "$POLICY_VAULT_CONTRACT_PATH"

      - name: Verify PaymentModule implementation on Sourcify
        if: ${{ env.ENABLE_SOURCIFY == 'true' }}
        run: >
          forge verify-contract
          --chain-id "$CHAIN_ID"
          --watch
          --verifier sourcify
          --compiler-version "$COMPILER_VERSION"
          --num-of-optimizations "$OPTIMIZER_RUNS"
          "${{ steps.deployment.outputs.payment_module_implementation }}"
          "$PAYMENT_MODULE_CONTRACT_PATH"

      - name: Verify PolicyVault implementation on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping PolicyVault verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.policy_vault_implementation }}" \
                "$POLICY_VAULT_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.policy_vault_implementation }}" \
                "$POLICY_VAULT_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Verify PaymentModule implementation on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping PaymentModule verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.payment_module_implementation }}" \
                "$PAYMENT_MODULE_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.payment_module_implementation }}" \
                "$PAYMENT_MODULE_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Verify AccessReceipt on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          constructor_args="$(cast abi-encode "constructor(address)" "${{ steps.deployment.outputs.deployer_address }}")"
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping AccessReceipt verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.access_receipt_address }}" \
                "$ACCESS_RECEIPT_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.access_receipt_address }}" \
                "$ACCESS_RECEIPT_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Verify PolicyVault proxy on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          initializer_calldata="$(cast calldata "initialize(address)" "${{ steps.deployment.outputs.deployer_address }}")"
          constructor_args="$(cast abi-encode "constructor(address,bytes)" "${{ steps.deployment.outputs.policy_vault_implementation }}" "$initializer_calldata")"
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping PolicyVault proxy verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.policy_vault_proxy }}" \
                "$PROXY_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.policy_vault_proxy }}" \
                "$PROXY_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Verify PaymentModule proxy on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          initializer_calldata="$(cast calldata "initialize(address,address,address)" "${{ steps.deployment.outputs.deployer_address }}" "${{ steps.deployment.outputs.policy_vault_proxy }}" "${{ steps.deployment.outputs.access_receipt_address }}")"
          constructor_args="$(cast abi-encode "constructor(address,bytes)" "${{ steps.deployment.outputs.payment_module_implementation }}" "$initializer_calldata")"
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping PaymentModule proxy verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.payment_module_proxy }}" \
                "$PROXY_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.payment_module_proxy }}" \
                "$PROXY_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Commit deployment artifact
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add "$DEPLOYMENT_FILE"
          if git diff --cached --quiet; then
            echo "No deployment artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: update $NETWORK_NAME deployment artifact"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.target.outputs.network_name }}-deployment
          path: |
            ${{ steps.target.outputs.deployment_file }}
            ${{ steps.target.outputs.broadcast_file }}

      - name: Publish workflow summary
        run: |
          {
            echo "## $NETWORK_NAME deployment"
            echo
            echo "- PolicyVault proxy: \`${{ steps.deployment.outputs.policy_vault_proxy }}\`"
            echo "- PolicyVault implementation: \`${{ steps.deployment.outputs.policy_vault_implementation }}\`"
            echo "- PaymentModule proxy: \`${{ steps.deployment.outputs.payment_module_proxy }}\`"
            echo "- PaymentModule implementation: \`${{ steps.deployment.outputs.payment_module_implementation }}\`"
            echo "- AccessReceipt: \`${{ steps.deployment.outputs.access_receipt_address }}\`"
            echo "- Deployer: \`${{ steps.deployment.outputs.deployer_address }}\`"
            echo "- Requested owner: \`${{ steps.deployment.outputs.requested_owner }}\`"
            echo "- Final transaction: \`${{ steps.deployment.outputs.transaction_hash }}\`"
            echo "- Block: \`${{ steps.deployment.outputs.block_number }}\`"
            if [ "$ENABLE_SOURCIFY" = "true" ]; then
              echo "- Sourcify PolicyVault implementation: $SOURCIFY_REPO_URL/${{ steps.deployment.outputs.policy_vault_implementation }}"
              echo "- Sourcify PaymentModule implementation: $SOURCIFY_REPO_URL/${{ steps.deployment.outputs.payment_module_implementation }}"
            fi
            echo "- $EXPLORER_LABEL PolicyVault proxy: $EXPLORER_ADDRESS_URL/${{ steps.deployment.outputs.policy_vault_proxy }}"
            echo "- $EXPLORER_LABEL PaymentModule proxy: $EXPLORER_ADDRESS_URL/${{ steps.deployment.outputs.payment_module_proxy }}"
            echo "- $EXPLORER_LABEL AccessReceipt: $EXPLORER_ADDRESS_URL/${{ steps.deployment.outputs.access_receipt_address }}"
            echo "- Explorer tx: $EXPLORER_TX_URL/${{ steps.deployment.outputs.transaction_hash }}"
          } >> "$GITHUB_STEP_SUMMARY"
