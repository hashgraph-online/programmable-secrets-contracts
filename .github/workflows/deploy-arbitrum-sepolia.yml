name: Deploy EVM Testnet

on:
  workflow_dispatch:
    inputs:
      network:
        description: Network to deploy
        required: true
        default: robinhood-testnet
        type: choice
        options:
          - arbitrum-sepolia
          - robinhood-testnet
      verify_native_explorer:
        description: Attempt native explorer verification for the selected network
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: deploy-${{ inputs.network }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: arbitrum-sepolia
    env:
      IMPLEMENTATION_CONTRACT_PATH: src/ProgrammableSecrets.sol:ProgrammableSecrets
      PROXY_CONTRACT_PATH: "@openzeppelin/contracts/proxy/ERC1967/ERC1967Proxy.sol:ERC1967Proxy"
      COMPILER_VERSION: v0.8.24+commit.e11b9ed9
      OPTIMIZER_RUNS: "200"
      ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
      ROBINHOOD_TESTNET_RPC_URL: ${{ secrets.ROBINHOOD_TESTNET_RPC_URL }}
      DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
      ETH_PK: ${{ secrets.ETH_PK }}
      ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Resolve deployment target
        id: target
        run: |
          case "${{ inputs.network }}" in
            arbitrum-sepolia)
              echo "CHAIN_ID=421614" >> "$GITHUB_ENV"
              echo "NETWORK_NAME=arbitrum-sepolia" >> "$GITHUB_ENV"
              echo "DEPLOYMENT_FILE=deployments/arbitrum-sepolia.json" >> "$GITHUB_ENV"
              echo "BROADCAST_FILE=broadcast/Deploy.s.sol/421614/run-latest.json" >> "$GITHUB_ENV"
              echo "RPC_URL=$ARBITRUM_SEPOLIA_RPC_URL" >> "$GITHUB_ENV"
              echo "EXPLORER_LABEL=Arbiscan" >> "$GITHUB_ENV"
              echo "EXPLORER_ADDRESS_URL=https://sepolia.arbiscan.io/address" >> "$GITHUB_ENV"
              echo "EXPLORER_TX_URL=https://sepolia.arbiscan.io/tx" >> "$GITHUB_ENV"
              echo "SOURCIFY_REPO_URL=https://repo.sourcify.dev/421614" >> "$GITHUB_ENV"
              echo "ENABLE_SOURCIFY=true" >> "$GITHUB_ENV"
              echo "NATIVE_VERIFIER=etherscan" >> "$GITHUB_ENV"
              {
                echo "chain_id=421614"
                echo "network_name=arbitrum-sepolia"
                echo "deployment_file=deployments/arbitrum-sepolia.json"
                echo "broadcast_file=broadcast/Deploy.s.sol/421614/run-latest.json"
                echo "enable_sourcify=true"
              } >> "$GITHUB_OUTPUT"
              ;;
            robinhood-testnet)
              echo "CHAIN_ID=46630" >> "$GITHUB_ENV"
              echo "NETWORK_NAME=robinhood-testnet" >> "$GITHUB_ENV"
              echo "DEPLOYMENT_FILE=deployments/robinhood-testnet.json" >> "$GITHUB_ENV"
              echo "BROADCAST_FILE=broadcast/Deploy.s.sol/46630/run-latest.json" >> "$GITHUB_ENV"
              echo "RPC_URL=$ROBINHOOD_TESTNET_RPC_URL" >> "$GITHUB_ENV"
              echo "EXPLORER_LABEL=Robinhood Explorer" >> "$GITHUB_ENV"
              echo "EXPLORER_ADDRESS_URL=https://explorer.testnet.chain.robinhood.com/address" >> "$GITHUB_ENV"
              echo "EXPLORER_TX_URL=https://explorer.testnet.chain.robinhood.com/tx" >> "$GITHUB_ENV"
              echo "SOURCIFY_REPO_URL=" >> "$GITHUB_ENV"
              echo "ENABLE_SOURCIFY=false" >> "$GITHUB_ENV"
              echo "NATIVE_VERIFIER=blockscout" >> "$GITHUB_ENV"
              echo "BLOCKSCOUT_VERIFIER_URL=https://explorer.testnet.chain.robinhood.com/api/" >> "$GITHUB_ENV"
              {
                echo "chain_id=46630"
                echo "network_name=robinhood-testnet"
                echo "deployment_file=deployments/robinhood-testnet.json"
                echo "broadcast_file=broadcast/Deploy.s.sol/46630/run-latest.json"
                echo "enable_sourcify=false"
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported network: ${{ inputs.network }}" >&2
              exit 1
              ;;
          esac

      - name: Validate deploy inputs
        run: |
          if [ -z "$RPC_URL" ]; then
            echo "Missing RPC_URL for $NETWORK_NAME" >&2
            exit 1
          fi
          if [ -z "$DEPLOYER_PRIVATE_KEY" ] && [ -z "$ETH_PK" ]; then
            echo "Missing DEPLOYER_PRIVATE_KEY secret" >&2
            exit 1
          fi

      - name: Normalize deployer key and owner
        run: |
          deployer_key="${DEPLOYER_PRIVATE_KEY:-$ETH_PK}"
          case "$deployer_key" in
            0x*) export ETH_PK="$deployer_key" ;;
            *) export ETH_PK="0x$deployer_key" ;;
          esac
          contract_owner="$(cast wallet address --private-key "$ETH_PK")"
          echo "ETH_PK=$ETH_PK" >> "$GITHUB_ENV"
          echo "CONTRACT_OWNER=$contract_owner" >> "$GITHUB_ENV"

      - name: Deploy contract
        run: |
          forge script script/Deploy.s.sol:Deploy --rpc-url "$RPC_URL" --broadcast -vvv

      - name: Capture deployment artifact
        id: deployment
        run: |
          contract_address="$(jq -r '.transactions[] | select(.contractName == "ERC1967Proxy") | .contractAddress' "$BROADCAST_FILE" | tail -n1)"
          implementation_address="$(jq -r '.transactions[] | select(.contractName == "ProgrammableSecrets") | .contractAddress' "$BROADCAST_FILE" | tail -n1)"
          deployer_address="$(jq -r '.transactions[] | select(.contractName == "ERC1967Proxy") | .transaction.from' "$BROADCAST_FILE" | tail -n1)"
          transaction_hash="$(jq -r '.receipts[] | .transactionHash' "$BROADCAST_FILE" | tail -n1)"
          block_number_hex="$(jq -r '.receipts[] | .blockNumber' "$BROADCAST_FILE" | tail -n1)"
          contract_address="$(cast to-check-sum-address "$contract_address")"
          implementation_address="$(cast to-check-sum-address "$implementation_address")"
          deployer_address="$(cast to-check-sum-address "$deployer_address")"
          contract_owner="$(cast to-check-sum-address "$CONTRACT_OWNER")"
          block_number="$(cast to-dec "$block_number_hex")"
          abi_checksum="$(shasum -a 256 abis/ProgrammableSecrets.abi.json | awk '{print $1}')"
          deployed_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          jq -n \
            --argjson chainId "$CHAIN_ID" \
            --arg network "$NETWORK_NAME" \
            --arg contractAddress "$contract_address" \
            --arg proxyAddress "$contract_address" \
            --arg implementationAddress "$implementation_address" \
            --arg upgradeOwner "$contract_owner" \
            --arg proxyKind "uups-erc1967" \
            --arg deployer "$deployer_address" \
            --argjson blockNumber "$block_number" \
            --arg transactionHash "$transaction_hash" \
            --arg deployedAt "$deployed_at" \
            --arg abiChecksum "$abi_checksum" \
            --arg gitCommit "$GITHUB_SHA" \
            '{
              chainId: $chainId,
              network: $network,
              contractAddress: $contractAddress,
              proxyAddress: $proxyAddress,
              implementationAddress: $implementationAddress,
              upgradeOwner: $upgradeOwner,
              proxyKind: $proxyKind,
              deployer: $deployer,
              blockNumber: $blockNumber,
              transactionHash: $transactionHash,
              deployedAt: $deployedAt,
              abiChecksum: $abiChecksum,
              gitCommit: $gitCommit
            }' > "$DEPLOYMENT_FILE"
          {
            echo "contract_address=$contract_address"
            echo "implementation_address=$implementation_address"
            echo "upgrade_owner=$contract_owner"
            echo "transaction_hash=$transaction_hash"
            echo "block_number=$block_number"
          } >> "$GITHUB_OUTPUT"

      - name: Verify implementation on Sourcify
        if: ${{ steps.target.outputs.enable_sourcify == 'true' }}
        run: >
          forge verify-contract
          --chain-id "$CHAIN_ID"
          --watch
          --verifier sourcify
          --compiler-version "$COMPILER_VERSION"
          --num-of-optimizations "$OPTIMIZER_RUNS"
          "${{ steps.deployment.outputs.implementation_address }}"
          "$IMPLEMENTATION_CONTRACT_PATH"

      - name: Verify implementation on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping Arbiscan verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.implementation_address }}" \
                "$IMPLEMENTATION_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.implementation_address }}" \
                "$IMPLEMENTATION_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Verify proxy on native explorer
        if: ${{ inputs.verify_native_explorer }}
        run: |
          initializer_calldata="$(cast calldata "initialize(address)" "${{ steps.deployment.outputs.upgrade_owner }}")"
          constructor_args="$(cast abi-encode "constructor(address,bytes)" "${{ steps.deployment.outputs.implementation_address }}" "$initializer_calldata")"
          case "$NATIVE_VERIFIER" in
            etherscan)
              api_key="${ARBISCAN_API_KEY:-$ETHERSCAN_API_KEY}"
              if [ -z "$api_key" ]; then
                echo "Skipping Arbiscan proxy verification because no API key is configured."
                exit 0
              fi
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --etherscan-api-key "$api_key" \
                "${{ steps.deployment.outputs.contract_address }}" \
                "$PROXY_CONTRACT_PATH"
              ;;
            blockscout)
              forge verify-contract \
                --chain-id "$CHAIN_ID" \
                --watch \
                --rpc-url "$RPC_URL" \
                --compiler-version "$COMPILER_VERSION" \
                --num-of-optimizations "$OPTIMIZER_RUNS" \
                --constructor-args "$constructor_args" \
                --verifier blockscout \
                --verifier-url "$BLOCKSCOUT_VERIFIER_URL" \
                "${{ steps.deployment.outputs.contract_address }}" \
                "$PROXY_CONTRACT_PATH"
              ;;
            *)
              echo "Unsupported native verifier: $NATIVE_VERIFIER" >&2
              exit 1
              ;;
          esac

      - name: Commit deployment artifact
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add "$DEPLOYMENT_FILE"
          if git diff --cached --quiet; then
            echo "No deployment artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: update $NETWORK_NAME deployment artifact"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.target.outputs.network_name }}-deployment
          path: |
            ${{ steps.target.outputs.deployment_file }}
            ${{ steps.target.outputs.broadcast_file }}

      - name: Publish workflow summary
        run: |
          {
            echo "## $NETWORK_NAME deployment"
            echo
            echo "- Proxy: \`${{ steps.deployment.outputs.contract_address }}\`"
            echo "- Implementation: \`${{ steps.deployment.outputs.implementation_address }}\`"
            echo "- Upgrade owner: \`${{ steps.deployment.outputs.upgrade_owner }}\`"
            echo "- Transaction: \`${{ steps.deployment.outputs.transaction_hash }}\`"
            echo "- Block: \`${{ steps.deployment.outputs.block_number }}\`"
            if [ "$ENABLE_SOURCIFY" = "true" ]; then
              echo "- Sourcify implementation: $SOURCIFY_REPO_URL/${{ steps.deployment.outputs.implementation_address }}"
            fi
            echo "- $EXPLORER_LABEL proxy: $EXPLORER_ADDRESS_URL/${{ steps.deployment.outputs.contract_address }}"
            echo "- $EXPLORER_LABEL implementation: $EXPLORER_ADDRESS_URL/${{ steps.deployment.outputs.implementation_address }}"
            echo "- Explorer tx: $EXPLORER_TX_URL/${{ steps.deployment.outputs.transaction_hash }}"
          } >> "$GITHUB_STEP_SUMMARY"
