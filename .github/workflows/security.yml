name: Solidity Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: solidity-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  slither:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Slither
        run: python -m pip install slither-analyzer

      - name: Run Slither
        run: >
          slither .
          --exclude-dependencies
          --exclude-informational
          --exclude-optimization
          --exclude timestamp,low-level-calls,calls-loop,reentrancy-events,missing-zero-check,unused-return,arbitrary-send-eth
          --fail-low
          --sarif results.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-sarif
          path: results.sarif

      - name: Upload SARIF to GitHub code scanning
        if: ${{ always() && (!github.event.repository.private || vars.ENABLE_GHAS_CODE_SCANNING == 'true') }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Record code scanning upload status
        if: ${{ always() }}
        run: |
          if [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ vars.ENABLE_GHAS_CODE_SCANNING }}" != "true" ]; then
            echo "GitHub code scanning upload skipped because this repository is private and GitHub Advanced Security is not enabled." >> "$GITHUB_STEP_SUMMARY"
            echo "Set the repository variable ENABLE_GHAS_CODE_SCANNING=true after enabling GitHub Advanced Security to publish SARIF directly to GitHub code scanning." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "GitHub code scanning upload attempted." >> "$GITHUB_STEP_SUMMARY"
          fi
