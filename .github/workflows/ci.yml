name: Foundry CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundry-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub workflows
        uses: reviewdog/action-actionlint@v1

  forge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show toolchain
        run: |
          forge --version
          cast --version

      - name: Check formatting
        run: forge fmt --check

      - name: Run lint
        run: forge lint

      - name: Build contracts
        run: forge build --sizes --skip script

      - name: Run tests
        run: forge test -vvv

      - name: Capture gas report
        run: forge test --gas-report | tee gas-report.txt

      - name: Check canonical artifacts
        run: |
          test -f abis/AccessReceipt.abi.json
          test -f abis/AddressAllowlistCondition.abi.json
          test -f abis/PaymentModule.abi.json
          test -f abis/PolicyVault.abi.json
          test -f abis/ThresholdCommitteeCondition.abi.json
          test -f abis/TimeRangeCondition.abi.json
          test -f abis/UaidOwnershipCondition.abi.json
          test -f deployments/arbitrum-sepolia.json
          test -f deployments/robinhood-testnet.json

      - name: Upload gas report
        uses: actions/upload-artifact@v7
        with:
          name: gas-report
          path: gas-report.txt

  cli-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI tests
        run: pnpm run test:cli

      - name: CLI help smoke test
        run: pnpm run help

      - name: Package smoke test
        run: |
          pnpm pack
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TARBALL="${PACKAGE_NAME}-${PACKAGE_VERSION}.tgz"
          npx --yes "./${TARBALL}" help

  stylus:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stylus/threshold-committee-condition

      - name: Install cargo-stylus
        run: cargo install cargo-stylus --version 0.10.0 --locked

      - name: Check formatting
        run: pnpm run stylus:fmt

      - name: Compile host-side tests
        run: pnpm run stylus:test

      - name: Run clippy
        run: pnpm run stylus:clippy

      - name: Build Stylus evaluator
        run: pnpm run stylus:build

      - name: Export Stylus ABI
        run: |
          cd stylus/threshold-committee-condition
          cargo stylus export-abi > target/threshold-committee-condition.sol

      - name: Upload Stylus artifacts
        uses: actions/upload-artifact@v7
        with:
          name: stylus-threshold-committee-condition
          path: |
            stylus/threshold-committee-condition/target/wasm32-unknown-unknown/release/threshold_committee_condition.wasm
            stylus/threshold-committee-condition/target/threshold-committee-condition.sol

  subgraph:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: subgraph/pnpm-lock.yaml

      - name: Install subgraph dependencies
        run: pnpm --dir subgraph install --frozen-lockfile

      - name: Generate manifests
        run: pnpm --dir subgraph run prepare:manifests

      - name: Verify generated manifests are checked in
        run: git diff --exit-code subgraph/subgraph.robinhood-testnet.yaml subgraph/subgraph.arbitrum-sepolia.yaml

      - name: Build subgraph manifests
        run: pnpm --dir subgraph run build
