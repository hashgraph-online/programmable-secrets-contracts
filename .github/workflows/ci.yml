name: Foundry CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundry-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint GitHub workflows
        uses: reviewdog/action-actionlint@v1

  forge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show toolchain
        run: |
          forge --version
          cast --version

      - name: Check formatting
        run: forge fmt --check

      - name: Run lint
        run: forge lint

      - name: Build contracts
        run: forge build --sizes --skip script

      - name: Run tests
        run: forge test -vvv

      - name: Capture gas report
        run: forge test --gas-report | tee gas-report.txt

      - name: Check canonical artifacts
        run: |
          test -f abis/AccessReceipt.abi.json
          test -f abis/AddressAllowlistCondition.abi.json
          test -f abis/PaymentModule.abi.json
          test -f abis/PolicyVault.abi.json
          test -f abis/TimeRangeCondition.abi.json
          test -f abis/UaidOwnershipCondition.abi.json
          test -f deployments/arbitrum-sepolia.json
          test -f deployments/robinhood-testnet.json

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt

  cli-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CLI help smoke test
        run: pnpm run help

      - name: Package smoke test
        run: |
          pnpm pack
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TARBALL="${PACKAGE_NAME}-${PACKAGE_VERSION}.tgz"
          npx --yes "./${TARBALL}" help
